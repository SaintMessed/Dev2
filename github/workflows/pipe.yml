name: DevSecOps Pipe

on:
  pull_request:
    branches: ["devbranch"]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install flake8

      - run: flake8 . > report.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.txt

  notify:
    needs: code-quality
    runs-on: ubuntu-latest

    steps:
      - run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.8621087888:AAFjRKLASZgGoPc0DF3GtP05FiPHDF2A5yc }}/sendMessage \
          -d chat_id=${{ secrets.8621087888 }} \
          -d text="Pipeline done for PR"
